<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Aaron</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header glass">
      <a class="brand" href="index.html">AaLeiRon IT Consulting</a>
      <nav class="site-nav">
        <a href="projects.html" data-text="nav.projects">Projects</a>
        <a href="blog.html" data-text="nav.blog">Blog</a>
        <a href="about.html" data-text="nav.about">About</a>
        <a href="contact.html" data-text="nav.contact">Contact</a>
      </nav>
      <div class="header-actions">
        <button class="lang-btn" data-lang-switch="de">DE</button>
        <button class="lang-btn" data-lang-switch="en">EN</button>
      </div>
    </header>

    <main class="page-main">
      <section class="section reveal">
        <div class="page-intro">
          <p class="eyebrow" data-text="contact.eyebrow">Contact</p>
          <h1 data-text="contact.title"></h1>
          <p class="lead" data-text="contact.intro"></p>
        </div>
      </section>

      <section class="section reveal two-col">
        <div class="glass panel">
          <h2 data-text="contact.detailsTitle">Direct contact</h2>
          <p data-text="contact.detailsText"></p>
          <div class="contact-links">
            <a href="mailto:you@example.com">you@example.com</a>
            <a href="https://www.linkedin.com/" target="_blank" rel="noreferrer">LinkedIn</a>
            <a href="https://www.instagram.com/" target="_blank" rel="noreferrer">Instagram</a>
          </div>
        </div>
        <form class="contact-form glass panel" action="https://formspree.io/f/yourid" method="POST">
          <label><span data-text="contact.formName">Name</span><input type="text" name="name" placeholder="Name" required></label>
          <label><span data-text="contact.formEmail">Email</span><input type="email" name="email" placeholder="Email" required></label>
          <label><span data-text="contact.formMessage">Message</span><textarea name="message" rows="7" placeholder="Message" required></textarea></label>
          <button class="btn btn-primary" type="submit" data-text="contact.formButton">Send message</button>
        </form>
      </section>

    </main>

    <footer class="site-footer"><p>© 2026 Aaron</p></footer>
  </div>
  <script src="js/content.js"></script>
  <script src="js/site.js"></script>
</body>
</html>
